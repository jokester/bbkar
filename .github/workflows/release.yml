name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Optional suffix appended to the Cargo version, for example -rc1"
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag_name="${GITHUB_REF_NAME}"
            release_name="${tag_name#v}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
            suffix="${{ inputs.version_suffix }}"

            if [[ -z "${version}" ]]; then
              echo "Failed to resolve Cargo package version" >&2
              exit 1
            fi

            tag_name="v${version}${suffix}"
            release_name="${version}${suffix}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: metadata
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: bbkar-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            artifact: bbkar-aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz bbkar
          cd ../../..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256
